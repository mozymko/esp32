<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

        <title>ESP32 Dashboard</title>

        <link rel="stylesheet" href="https://unpkg.com/uplot/dist/uPlot.min.css">
        <script src="https://unpkg.com/uplot/dist/uPlot.iife.min.js"></script>

        <style>
            html, body {
                height: 100%;
                margin: 0;
                overflow: hidden;
                font-family: Arial, sans-serif;
                background: #0b1220;
                color: white;
            }

            body {
                display: flex;
                flex-direction: column;
            }

            .header {
                padding: 12px;
                font-size: 22px;
                font-weight: bold;
                text-align: center;
            }

            .rangeBar {
                display: flex;
                justify-content: center;
                gap: 10px;
                padding: 8px;
            }

            .rangeBtn {
                padding: 6px 12px;
                border-radius: 8px;
                border: none;
                cursor: pointer;
                background: rgba(255,255,255,0.1);
                color: white;
            }

            .rangeBtn.active {
                background: #1f6feb;
            }

            .grid {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 10px;
                padding: 10px;
                flex: 1;
                min-height: 0;
            }

            .panel {
                display: flex;
                flex-direction: column;
                min-height: 0;
                background: rgba(255,255,255,0.05);
                border-radius: 14px;
                padding: 10px;
            }

            .title {
                font-size: 16px;
                margin-bottom: 6px;
            }

            .value {
                font-size: 22px;
                margin-bottom: 8px;
            }

            .chart-container {
                flex: 1;
                min-height: 0;
                width: 100%;
                position: relative;
            }

            .u-legend {
                color: white;
            }
            .u-legend th, .u-legend td {
                color: white !important;
            }

            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.85);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 999;
            }

            .loginBox {
                width: 280px;
                background: rgba(255,255,255,0.08);
                padding: 20px;
                border-radius: 14px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            input {
                padding: 10px;
                border-radius: 8px;
                border: none;
                outline: none;
            }

            button {
                padding: 10px;
                border-radius: 8px;
                border: none;
                cursor: pointer;
                background: #1f6feb;
                color: white;
                font-weight: bold;
            }
        </style>
    </head>

    <body>

        <div class="overlay" id="overlay">
            <div class="loginBox">
                <input id="email" placeholder="email">
                <input id="password" type="password" placeholder="password">
                <button id="loginBtn">Login</button>
            </div>
        </div>

        <div class="header">ESP32 Dashboard</div>

        <div class="rangeBar">
            <button class="rangeBtn active" data-range="1">1h</button>
            <button class="rangeBtn" data-range="6">6h</button>
            <button class="rangeBtn" data-range="24">24h</button>
            <button class="rangeBtn" data-range="168">7d</button>
            <button class="rangeBtn" data-range="1440">All</button>
        </div>

        <div class="grid">
            <div class="panel">
                <div class="title">Temperature</div>
                <div class="value" id="temp">--</div>
                <div class="chart-container" id="tempChart"></div>
            </div>

            <div class="panel">
                <div class="title">Humidity</div>
                <div class="value" id="hum">--</div>
                <div class="chart-container" id="humChart"></div>
            </div>

            <div class="panel">
                <div class="title">Pressure</div>
                <div class="value" id="press">--</div>
                <div class="chart-container" id="pressChart"></div>
            </div>
        </div>

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
            import { getDatabase, ref, onChildAdded, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
            import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

            const firebaseConfig = {
                apiKey: "FIREBASE_API_KEY",
                databaseURL: "DATABASE_URL"
            };

            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            const auth = getAuth(app);

            let tempPlot, humPlot, pressPlot;
            let started = false;
            let rangeHours = 1;

            const dataTime = [];
            const dataTemp = [];
            const dataHum = [];
            const dataPress = [];

            let renderTimeout = null;

            function makePlot(container, label, strokeColor, fillColor, min, max) {
                const opts = {
                    width: container.clientWidth || 300,
                    height: container.clientHeight || 200,
                    axes: [
                        {
                            stroke: "white",
                            grid: { stroke: "rgba(255,255,255,0.1)" }
                        },
                        {
                            stroke: "white",
                            grid: { stroke: "rgba(255,255,255,0.1)" }
                        }
                    ],
                    scales: {
                        x: { time: true },
                        y: { range: [min, max], auto: false }
                    },
                    series: [
                        { label: "Time" },
                        {
                            label: label,
                            stroke: strokeColor,
                            fill: fillColor,
                            width: 2
                        }
                    ],
                    cursor: {
                        sync: { key: "syncGroup" }
                    }
                };

                const u = new uPlot(opts, [[], []], container);

                new ResizeObserver(entries => {
                    for (let entry of entries) {
                        u.setSize({
                            width: entry.contentRect.width,
                            height: entry.contentRect.height
                        });
                    }
                }).observe(container);

                return u;
            }

            function updateRange() {
                if(rangeHours >= 1440) {
                    const minTime = dataTime.length > 0 ? dataTime[0] : null;
                    const maxTime = dataTime.length > 0 ? dataTime[dataTime.length - 1] : null;
                    if(minTime) {
                        [tempPlot, humPlot, pressPlot].forEach(p => p.setScale('x', {min: minTime, max: maxTime}));
                    }
                    return;
                }

                const nowSec = Math.floor(Date.now() / 1000);
                const rangeSec = rangeHours * 3600;

                [tempPlot, humPlot, pressPlot].forEach(p => {
                    if (p) p.setScale('x', { min: nowSec - rangeSec, max: nowSec });
                });
            }

            function scheduleRender() {
                if (!renderTimeout) {
                    renderTimeout = requestAnimationFrame(() => {
                        tempPlot.setData([dataTime, dataTemp]);
                        humPlot.setData([dataTime, dataHum]);
                        pressPlot.setData([dataTime, dataPress]);

                        updateRange();
                        renderTimeout = null;
                    });
                }
            }

            const dataRef = query(ref(db, "sensorData"), limitToLast(110000));

            function start() {
                if (started) return;
                started = true;

                document.getElementById("overlay").style.display = "none";

                tempPlot = makePlot(document.getElementById("tempChart"), "Temp", "#ffa500", "#ffa50033", 0, 40);
                humPlot = makePlot(document.getElementById("humChart"), "Humidity", "#00bfff", "#00bfff33", 0, 100);
                pressPlot = makePlot(document.getElementById("pressChart"), "Pressure", "#00ff00", "#00ff0033", 950, 1050);

                onChildAdded(dataRef, (snapshot) => {
                    const key = snapshot.key;
                    const val = snapshot.val();

                    const tsSeconds = Number(key);

                    document.getElementById("temp").innerText = val.temp + "°C";
                    document.getElementById("hum").innerText = val.humidity + "%";
                    document.getElementById("press").innerText = val.pressure + " hPa";

                    dataTime.push(tsSeconds);
                    dataTemp.push(val.temp);
                    dataHum.push(val.humidity);
                    dataPress.push(val.pressure);

                    scheduleRender();
                });

                window.addEventListener("dblclick", () => {
                    updateRange();
                });
            }

            document.querySelectorAll(".rangeBtn").forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll(".rangeBtn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    rangeHours = Number(btn.dataset.range);
                    updateRange();
                };
            });

            document.getElementById("loginBtn").onclick = () => {
                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;
                signInWithEmailAndPassword(auth, email, password);
            };

            onAuthStateChanged(auth, (user) => {
                if (user) start();
            });
        </script>

    </body>
</html>
