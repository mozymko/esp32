<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

        <title>ESP32 Dashboard</title>

        <link rel="stylesheet" href="https://unpkg.com/uplot/dist/uPlot.min.css">
        <script src="https://unpkg.com/uplot/dist/uPlot.iife.min.js"></script>

        <style>
            * {
                box-sizing: border-box;
            }

            html, body {
                height: 100%;
                margin: 0;
                overflow: hidden;
                font-family: Arial, sans-serif;
                background: #0b1220;
                color: white;
            }

            body {
                display: flex;
                flex-direction: column;
            }

            .header {
                padding: 12px;
                font-size: 22px;
                font-weight: bold;
                text-align: center;
            }

            .rangeBar {
                display: flex;
                justify-content: center;
                gap: 10px;
                padding: 8px;
            }

            .rangeBtn {
                padding: 6px 12px;
                border-radius: 8px;
                border: none;
                cursor: pointer;
                background: rgba(255,255,255,0.1);
                color: white;
                transition: opacity 0.3s ease, background 0.3s ease;
            }

            .rangeBtn:disabled {
                opacity: 0.3;
                cursor: not-allowed;
            }

            .rangeBtn.active:not(:disabled) {
                background: #1f6feb;
            }

            .grid {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 10px;
                padding: 10px;
                flex: 1;
                min-height: 0;
            }

            .panel {
                display: flex;
                flex-direction: column;
                min-height: 0;
                background: rgba(255,255,255,0.05);
                border-radius: 14px;
                padding: 10px;
            }

            .title {
                font-size: 16px;
                margin-bottom: 6px;
            }

            .value {
                font-size: 22px;
                margin-bottom: 8px;
            }

            .chart-container {
                flex: 1;
                min-height: 0;
                width: 100%;
                position: relative;
            }

            .u-legend {
                color: white;
            }

            .u-legend th, .u-legend td {
                color: white !important;
            }

            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.85);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 999;
            }

            .loginBox {
                width: 280px;
                background: rgba(255,255,255,0.08);
                padding: 20px;
                border-radius: 14px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            input {
                padding: 10px;
                border-radius: 8px;
                border: none;
                outline: none;
            }

            button {
                padding: 10px;
                border-radius: 8px;
                border: none;
                cursor: pointer;
                background: #1f6feb;
                color: white;
                font-weight: bold;
            }
        </style>
    </head>

    <body>
        <div class="overlay" id="overlay">
            <div class="loginBox">
                <input id="email" placeholder="email">
                <input id="password" type="password" placeholder="password">
                <button id="loginBtn">Login</button>
            </div>
        </div>

        <div class="header">ESP32 Dashboard</div>

        <div class="rangeBar">
            <button class="rangeBtn active" data-range="1" disabled>1h</button>
            <button class="rangeBtn" data-range="6" disabled>6h</button>
            <button class="rangeBtn" data-range="24" disabled>24h</button>
            <button class="rangeBtn" data-range="168" disabled>7d</button>
            <button class="rangeBtn" data-range="1440" disabled>All</button>
        </div>

        <div class="grid">
            <div class="panel">
                <div class="title">Temperature</div>
                <div class="value" id="temp">--</div>
                <div class="chart-container" id="tempChart"></div>
            </div>

            <div class="panel">
                <div class="title">Humidity</div>
                <div class="value" id="hum">--</div>
                <div class="chart-container" id="humChart"></div>
            </div>

            <div class="panel">
                <div class="title">Pressure</div>
                <div class="value" id="press">--</div>
                <div class="chart-container" id="pressChart"></div>
            </div>
        </div>

        <script type="module" src="./app.js"></script>
    </body>
</html>
